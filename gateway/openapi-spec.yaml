      summary: "Patch parcial"
      security:
        - travelhub_jwt: []
      parameters:
        - name: path
          in: path
          required: true
          type: string
      x-google-backend:
        address: "https://user-services-ridyy4wz4q-uc.a.run.app"
        path_translation: APPEND_PATH_TO_ADDRESS
      responses:
        "200":
          description: "Patch parcial"
        "401":
