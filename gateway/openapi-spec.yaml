swagger: "2.0"
info:
  title: "TravelHub API Gateway"
  version: "1.0.0"
  description: |
    Gateway de entrada para TravelHub. Valida JWT a nivel de infraestructura
    y rutea a microservicios en Cloud Run.

host: "travelhub-gateway-1yvtqj7r.uc.gateway.dev"
basePath: "/"
schemes:
  - "https"
produces:
  - "application/json"
consumes:
  - "application/json"

# =============================================================================
# CORS — habilita preflight en todos los endpoints del gateway
# =============================================================================
x-google-endpoints:
  - name: "travelhub-gateway-1yvtqj7r.uc.gateway.dev"
    allowCors: true

# =============================================================================
# Configuracion de seguridad JWT
# =============================================================================
securityDefinitions:
  travelhub_jwt:
    authorizationUrl: ""
    flow: "implicit"
    type: "oauth2"
    x-google-issuer: "https://auth.travelhub.app"
    x-google-audiences: "travelhub-api"
    x-google-jwks_uri: "https://user-services-ridyy4wz4q-uc.a.run.app/.well-known/jwks.json"

# =============================================================================
# Rutas — Microservicios
# =============================================================================
paths:

  # ---------------------------------------------------------------------------
  # User Service — Rutas PUBLICAS (sin JWT)
  # Backend: user-services-ridyy4wz4q-uc.a.run.app
  # ---------------------------------------------------------------------------

  /.well-known/jwks.json:
    get:
      operationId: "GetJwks"
      summary: "Endpoint JWKS publico — expone claves publicas RS256 para verificacion JWT"
      x-google-backend:
        address: "https://user-services-ridyy4wz4q-uc.a.run.app"
        path_translation: APPEND_PATH_TO_ADDRESS
      responses:
        "200":
          description: "JWKS document"
    options:
      operationId: "GetJwksCors"
      summary: "CORS preflight"
      x-google-backend:
        address: "https://user-services-ridyy4wz4q-uc.a.run.app"
        path_translation: APPEND_PATH_TO_ADDRESS
      responses:
        "204":
          description: "CORS preflight"

  /health:
    get:
      operationId: "HealthCheck"
      summary: "Health check global — no requiere JWT"
      x-google-backend:
        address: "https://user-services-ridyy4wz4q-uc.a.run.app"
