# =============================================================================
# TravelHub — API Gateway OpenAPI Specification
# =============================================================================
# Configura GCP API Gateway con validacion JWT nativa.
# El gateway valida: firma RS256, issuer, audience, expiracion.
# Los claims de negocio (role, mfa_verified) los valida el backend.
#
# IMPORTANTE: Reemplazar PLACEHOLDER en las URLs de x-google-backend
# con los hashes reales de Cloud Run una vez desplegados los servicios.
# =============================================================================

swagger: "2.0"
info:
  title: "TravelHub API Gateway"
  version: "1.0.0"
  description: |
    Gateway de entrada para TravelHub. Valida JWT a nivel de infraestructura
    y rutea a microservicios en Cloud Run.

host: "travelhub-gateway-PLACEHOLDER.a.run.app"
basePath: "/"
schemes:
  - "https"

# =============================================================================
# Configuracion de seguridad JWT
# =============================================================================
securityDefinitions:
  travelhub_jwt:
    authorizationUrl: ""
    flow: "implicit"
    type: "oauth2"
    x-google-issuer: "https://auth.travelhub.app"
    x-google-audiences: "travelhub-api"
    x-google-jwks_uri: "https://user-services-154299161799.us-central1.run.app/.well-known/jwks.json"

# =============================================================================
# Rutas — Microservicios
# =============================================================================
paths:

  # ---------- Rutas PUBLICAS (sin JWT) ----------

  /api/v1/auth/login:
    post:
      operationId: "authLogin"
      summary: "Login — no requiere JWT"
      x-google-backend:
        address: "https://user-services-154299161799.us-central1.run.app"
        path_translation: APPEND_PATH_TO_ADDRESS
      responses:
        200:
          description: "Login exitoso, retorna JWT"

  /api/v1/auth/register:
    post:
      operationId: "authRegister"
      summary: "Registro de usuario — no requiere JWT"
      x-google-backend:
        address: "https://user-services-154299161799.us-central1.run.app"
        path_translation: APPEND_PATH_TO_ADDRESS
      responses:
        201:
          description: "Usuario registrado"

  /api/v1/auth/refresh:
    post:
      operationId: "authRefresh"
      summary: "Refresh token — no requiere JWT (usa refresh token)"
      x-google-backend:
        address: "https://user-services-154299161799.us-central1.run.app"
        path_translation: APPEND_PATH_TO_ADDRESS
      responses:
        200:
          description: "Nuevo access token emitido"

  /health:
    get:
      operationId: "healthCheck"
      summary: "Health check — no requiere JWT"
      x-google-backend:
        address: "https://user-services-154299161799.us-central1.run.app"
        path_translation: APPEND_PATH_TO_ADDRESS
      responses:
        200:
          description: "Servicio saludable"

  /.well-known/jwks.json:
    get:
      operationId: "getJwks"
      summary: "Endpoint JWKS publico"
      x-google-backend:
        address: "https://user-services-154299161799.us-central1.run.app"
        path_translation: APPEND_PATH_TO_ADDRESS
      responses:
        200:
          description: "JWKS document"

  # ---------- Rutas PROTEGIDAS (requieren JWT valido) ----------

  /api/v1/auth/me:
    get:
      operationId: "getUserInfo"
      summary: "Informacion del usuario autenticado"
      security:
        - travelhub_jwt: []
      x-google-backend:
        address: "https://user-services-154299161799.us-central1.run.app"
        path_translation: APPEND_PATH_TO_ADDRESS
      responses:
        200:
          description: "Informacion del usuario autenticado"
        401:
          description: "JWT invalido o expirado — rechazado por gateway"

  /api/v1/search/{path}:
    get:
      operationId: "searchServices"
      summary: "Busqueda de hospedajes"
      security:
        - travelhub_jwt: []
      x-google-backend:
        address: "https://search-services-PLACEHOLDER.a.run.app"
        path_translation: APPEND_PATH_TO_ADDRESS
      parameters:
        - name: path
          in: path
          required: true
          type: string
      responses:
        200:
          description: "Resultados de busqueda"
        401:
          description: "JWT invalido o expirado — rechazado por gateway"

  /api/v1/bookings/{path}:
    get:
      operationId: "bookingServicesGet"
      summary: "Consultar reservas"
      security:
        - travelhub_jwt: []
      x-google-backend:
        address: "https://booking-services-PLACEHOLDER.a.run.app"
        path_translation: APPEND_PATH_TO_ADDRESS
      parameters:
        - name: path
          in: path
          required: true
          type: string
      responses:
        200:
          description: "Reservas del usuario"
        401:
          description: "JWT invalido"
    post:
      operationId: "bookingServicesPost"
      summary: "Crear reserva"
      security:
        - travelhub_jwt: []
      x-google-backend:
        address: "https://booking-services-PLACEHOLDER.a.run.app"
        path_translation: APPEND_PATH_TO_ADDRESS
      parameters:
        - name: path
          in: path
          required: true
          type: string
      responses:
        201:
          description: "Reserva creada"
        401:
          description: "JWT invalido"

  /api/v1/payments/{path}:
    post:
      operationId: "paymentServices"
      summary: "Procesar pago"
      security:
        - travelhub_jwt: []
      x-google-backend:
        address: "https://payments-services-PLACEHOLDER.a.run.app"
        path_translation: APPEND_PATH_TO_ADDRESS
      parameters:
        - name: path
          in: path
          required: true
          type: string
      responses:
        200:
          description: "Pago procesado"
        401:
          description: "JWT invalido"

  /api/v1/inventory/{path}:
    get:
      operationId: "inventoryServicesGet"
      summary: "Consultar inventario"
      security:
        - travelhub_jwt: []
      x-google-backend:
        address: "https://inventory-services-PLACEHOLDER.a.run.app"
        path_translation: APPEND_PATH_TO_ADDRESS
      parameters:
        - name: path
          in: path
          required: true
          type: string
      responses:
        200:
          description: "Inventario"
        401:
          description: "JWT invalido"
    put:
      operationId: "inventoryServicesPut"
      summary: "Actualizar inventario"
      security:
        - travelhub_jwt: []
      x-google-backend:
        address: "https://inventory-services-PLACEHOLDER.a.run.app"
        path_translation: APPEND_PATH_TO_ADDRESS
      parameters:
        - name: path
          in: path
          required: true
          type: string
      responses:
        200:
          description: "Inventario actualizado"
        401:
          description: "JWT invalido"

  /api/v1/notifications/{path}:
    get:
      operationId: "notificationServices"
      summary: "Notificaciones"
      security:
        - travelhub_jwt: []
      x-google-backend:
        address: "https://notification-services-PLACEHOLDER.a.run.app"
        path_translation: APPEND_PATH_TO_ADDRESS
      parameters:
        - name: path
          in: path
          required: true
          type: string
      responses:
        200:
          description: "Notificaciones"
        401:
          description: "JWT invalido"

  /api/v1/pms/{path}:
    get:
      operationId: "pmsServicesGet"
      summary: "Integracion PMS"
      security:
        - travelhub_jwt: []
      x-google-backend:
        address: "https://pms-integration-services-PLACEHOLDER.a.run.app"
        path_translation: APPEND_PATH_TO_ADDRESS
      parameters:
        - name: path
          in: path
          required: true
          type: string
      responses:
        200:
          description: "Datos PMS"
        401:
          description: "JWT invalido"
    post:
      operationId: "pmsServicesPost"
      summary: "Webhook PMS"
      security:
        - travelhub_jwt: []
      x-google-backend:
        address: "https://pms-integration-services-PLACEHOLDER.a.run.app"
        path_translation: APPEND_PATH_TO_ADDRESS
      parameters:
        - name: path
          in: path
          required: true
          type: string
      responses:
        200:
          description: "PMS sincronizado"
        401:
          description: "JWT invalido"

  /api/v1/cart/{path}:
    get:
      operationId: "cartServicesGet"
      summary: "Carrito de compras"
      security:
        - travelhub_jwt: []
      x-google-backend:
        address: "https://shopping-cart-services-PLACEHOLDER.a.run.app"
        path_translation: APPEND_PATH_TO_ADDRESS
      parameters:
        - name: path
          in: path
          required: true
          type: string
      responses:
        200:
          description: "Carrito"
        401:
          description: "JWT invalido"
    post:
      operationId: "cartServicesPost"
      summary: "Agregar al carrito"
      security:
        - travelhub_jwt: []
      x-google-backend:
        address: "https://shopping-cart-services-PLACEHOLDER.a.run.app"
        path_translation: APPEND_PATH_TO_ADDRESS
      parameters:
        - name: path
          in: path
          required: true
          type: string
      responses:
        201:
          description: "Item agregado"
        401:
          description: "JWT invalido"

  # ---------- Rutas ADMIN (requieren JWT + validacion RBAC en backend) ----------

  /api/v1/admin/{path}:
    get:
      operationId: "adminGet"
      summary: "Panel admin — JWT validado en gateway, RBAC en backend"
      security:
        - travelhub_jwt: []
      x-google-backend:
        address: "https://user-services-154299161799.us-central1.run.app"
        path_translation: APPEND_PATH_TO_ADDRESS
      parameters:
        - name: path
          in: path
          required: true
          type: string
      responses:
        200:
          description: "Datos admin"
        401:
          description: "JWT invalido"
        403:
          description: "Rol insuficiente — rechazado por Chain of Responsibility"
